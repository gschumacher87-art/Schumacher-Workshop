<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Schumacher Automotive</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="sidebar">
    <div class="sidebar-header">Schumacher Automotive</div>
    <ul>
        <li class="active">Dashboard</li>
    </ul>
</div>

<div class="main">
    <div class="dashboard">
        <div class="dashboard-top">
            <canvas id="analogClock" width="120" height="120"></canvas>
            <div class="current-date" id="currentDate"></div>
        </div>

        <div class="cards">
            <div class="card">
                <h3>Calendar</h3>
                <p id="bookingsCount">0</p>
            </div>
            <div class="card">
                <h3>Vehicles in Workshop</h3>
                <p id="vehiclesCount">0</p>
            </div>
            <div class="card">
                <h3>Today's Jobs</h3>
                <p id="jobsCount">0</p>
            </div>
        </div>
    </div>
</div>

<script src="apps.js"></script>
</body>
</html>
