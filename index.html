<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Schumacher Automotive Dashboard</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- SIDEBAR -->
    <div class="sidebar">
        <div class="sidebar-header">
            <h2>Schumacher Automotive</h2>
        </div>
        <ul class="sidebar-menu">
            <li class="active">Dashboard</li>
        </ul>
    </div>

    <!-- MAIN CONTENT -->
    <div class="main">
        <div class="dashboard-header">
            <h1>Dashboard</h1>
            <div class="clock" id="dashboardClock">00:00:00</div>
        </div>

        <!-- CARDS -->
        <div class="cards">
            <div class="card">
                <h3>Today's Bookings <span id="bookingDate">--/--/----</span></h3>
                <p id="bookingsCount">0</p>
            </div>
            <div class="card">
                <h3>Vehicles in Workshop</h3>
                <p id="vehiclesCount">0</p>
            </div>
            <div class="card">
                <h3>Hours Booked Today</h3>
                <p id="hoursCount">0</p>
            </div>
        </div>
    </div>

    <script src="apps.js"></script>
</body>
</html>
