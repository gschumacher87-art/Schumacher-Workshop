<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Schumacher Automotive DMS</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="sidebar">
    <h2 class="sidebar-header">Schumacher Automotive</h2>
    <ul class="sidebar-tabs">
        <li class="active">Dashboard</li>
    </ul>
</div>

<div class="main">
    <div class="top-bar">
        <div id="liveClock"></div>
    </div>

    <div class="cards">
        <div class="card">
            <h3>Today's Bookings</h3>
            <p id="bookingsToday">0</p>
            <p id="currentDate"></p>
        </div>
        <div class="card">
            <h3>Vehicles in Workshop</h3>
            <p id="vehiclesCount">0</p>
        </div>
        <div class="card">
            <h3>Hours Booked Today</h3>
            <p id="hoursBooked">0</p>
        </div>
    </div>
</div>

<script src="app.js"></script>
</body>
</html>
