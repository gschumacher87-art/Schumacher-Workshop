<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Schumacher Automotive DMS</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="sidebar">
    <div class="sidebar-header">Schumacher Automotive</div>
    <ul class="sidebar-menu">
        <li class="active">Dashboard</li>
    </ul>
</div>

<div class="main">
    <div class="top-bar">
        <div id="liveClock"></div>
    </div>

    <div class="dashboard-cards">
        <div class="card">
            <h3>Today's Bookings</h3>
            <p id="todaysDate"></p>
        </div>
        <div class="card">
            <h3>Vehicles in Workshop</h3>
            <p id="vehiclesCount">0</p>
        </div>
        <div class="card">
            <h3>Hours Booked Today</h3>
            <p id="hoursBooked">0</p>
        </div>
    </div>
</div>

<script>
    // Live Clock
    function updateClock() {
        const clock = document.getElementById('liveClock');
        const now = new Date();
        clock.textContent = now.toLocaleTimeString();
    }
    setInterval(updateClock, 1000);
    updateClock();

    // Today's date in card
    const dateEl = document.getElementById('todaysDate');
    dateEl.textContent = new Date().toLocaleDateString('en-AU', { weekday: 'long', year: 'numeric', month: 'short', day: 'numeric' });
</script>

</body>
</html>
