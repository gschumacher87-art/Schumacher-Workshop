<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Schumacher Automotive</title>
<link rel="stylesheet" href="styles.css">
<style>
  /* ===== GLOBAL ===== */
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f4f4f4;
  }

  .hidden { display: none; }

  /* ===== SIDEBAR ===== */
  .container { display: flex; }
  .sidebar {
    width: 200px;
    background: #222;
    color: #fff;
    height: 100vh;
    padding: 10px;
    box-sizing: border-box;
  }
  .sidebar-header {
    text-align: center;
    font-weight: bold;
    color: yellow;
    margin-bottom: 10px;
  }
  .sidebar ul {
    list-style: none;
    padding: 0;
    margin: 0;
  }
  .sidebar ul li {
    padding: 12px;
    cursor: pointer;
    border-bottom: 1px solid #333;
  }
  .sidebar ul li.active {
    background: #333;
  }

  /* ===== MAIN ===== */
  .main {
    flex: 1;
    padding: 20px;
  }

  /* ===== CARDS ===== */
  .cards {
    display: flex;
    gap: 15px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }
  .card {
    flex: 1 1 150px;
    background: #fff;
    padding: 15px;
    text-align: center;
    border-radius: 6px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.2);
    cursor: pointer;
  }
  .card h3 { margin: 0 0 10px 0; font-size: 16px; }
  .card p { font-size: 24px; margin: 0; }

  /* ===== SECTIONS ===== */
  section { margin-bottom: 20px; }
  button { cursor: pointer; padding: 8px 12px; margin-bottom: 10px; }

  /* ===== LISTS ===== */
  ul { list-style: none; padding-left: 0; }
  ul li { background: #fff; padding: 10px; margin-bottom: 5px; border-radius: 4px; display: flex; justify-content: space-between; align-items: center; }
</style>
</head>
<body>

<div class="container">

  <!-- ===== SIDEBAR ===== -->
  <aside class="sidebar">
    <div class="sidebar-header">Schumacher Automotive</div>
    <ul>
      <li class="active" id="dashboardTab">Dashboard</li>
      <li id="customersTab">Customers</li>
      <li id="quotesTab">Quotes</li>
      <li id="invoicesTab">Invoices</li>
      <li id="repairsTab">Repairs</li>
      <li id="partsTab">Parts</li>
    </ul>
  </aside>

  <!-- ===== MAIN CONTENT ===== -->
  <main class="main">

    <!-- DASHBOARD -->
    <section id="dashboardSection" class="section">
      <div class="cards">
        <div class="card calendar-card">
          <h3>Calendar</h3>
          <p id="bookingsCount">0</p>
        </div>
        <div class="card vehicles-card">
          <h3>Vehicles in Workshop</h3>
          <p id="vehiclesCount">0</p>
        </div>
        <div class="card jobs-card">
          <h3>Today's Jobs</h3>
          <p id="jobsCount">0</p>
        </div>
      </div>
    </section>

    <!-- CALENDAR -->
    <section id="calendarSection" class="section hidden">
      <div class="calendar-header">
        <button id="prevMonth">&lt;</button>
        <span id="monthYear"></span>
        <button id="nextMonth">&gt;</button>
      </div>
      <div class="calendar-table-container">
        <table id="calendarTable">
          <thead>
            <tr>
              <th>Sun</th><th>Mon</th><th>Tue</th><th>Wed</th>
              <th>Thu</th><th>Fri</th><th>Sat</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
      <div id="bookingForm" class="hidden" style="margin-top:15px;"></div>
    </section>

    <!-- CUSTOMERS -->
    <section id="customersSection" class="section hidden">
      <h2>Customers</h2>
      <button id="addCustomerBtn">Add Customer</button>
      <div id="customersList"></div>
    </section>

    <!-- QUOTES -->
    <section id="quotesSection" class="section hidden">
      <h2>Quotes</h2>
      <button id="addQuoteBtn">Add Quote / Repair</button>
      <div id="quotesList"></div>
    </section>

    <!-- INVOICES -->
    <section id="invoicesSection" class="section hidden">
      <h2>Invoices</h2>
      <button id="addInvoiceBtn">Add Invoice</button>
      <div id="invoicesList"></div>
    </section>

    <!-- REPAIRS -->
    <section id="repairsSection" class="section hidden">
      <h2>Repair Types</h2>
      <button id="addRepairBtn">Add Repair</button>
      <ul id="repairsList"></ul>
    </section>

    <!-- PARTS -->
    <section id="partsSection" class="section hidden">
      <h2>Parts</h2>
      <button id="addPartBtn">Add Part</button>
      <ul id="partsList"></ul>
    </section>

  </main>

</div>

<!-- MODALS -->
<div id="bookingModal" class="hidden"></div>
<div id="customerModal" class="hidden"></div>
<div id="vehicleModal" class="hidden"></div>
<div id="quoteModal" class="hidden"></div>
<div id="invoiceModal" class="hidden"></div>

<!-- SCRIPTS -->
<script src="apps.js"></script>
<script src="bookings.js"></script>
<script src="customers.js"></script>
<script src="quotes.js"></script>
<script src="invoices.js"></script>
<script src="repairs.js"></script>
<script src="parts.js"></script>

</body>
</html>
