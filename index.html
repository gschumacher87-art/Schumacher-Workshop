<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Schumacher Automotive</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="container">

  <!-- ===== SIDEBAR ===== -->
  <aside class="sidebar">
    <div class="sidebar-header">Schumacher Automotive</div>
    <ul>
      <li class="active" id="dashboardTab">Dashboard</li>
      <li id="customersTab">Customers</li>
      <li id="quotesTab">Quotes</li>
      <li id="invoicesTab">Invoices</li>
      <li id="repairsTab">Repairs</li>
      <li id="partsTab">Parts</li>
      <li id="techniciansTab">Technicians</li>
    </ul>
  </aside>

  <!-- ===== MAIN CONTENT ===== -->
  <main class="main">

    <!-- DASHBOARD -->
    <section id="dashboardSection" class="section">
      <div class="cards">
        <div class="card calendar-card">
          <h3>Calendar</h3>
          <p id="bookingsCount">0</p>
        </div>
        <div class="card vehicles-card">
          <h3>Vehicles in Workshop</h3>
          <p id="vehiclesCount">0</p>
        </div>
        <div class="card jobs-card">
          <h3>Today's Jobs</h3>
          <p id="jobsCount">0</p>
        </div>
      </div>
    </section>

    <!-- CALENDAR -->
    <section id="calendarSection" class="section hidden">
      <div class="calendar-header">
        <button id="prevMonth">&lt;</button>
        <span id="monthYear"></span>
        <button id="nextMonth">&gt;</button>
      </div>
      <div class="calendar-table-container">
        <table id="calendarTable">
          <thead>
            <tr>
              <th>Sun</th><th>Mon</th><th>Tue</th><th>Wed</th>
              <th>Thu</th><th>Fri</th><th>Sat</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
      <div id="bookingForm" class="hidden"></div>
    </section>

    <!-- CUSTOMERS -->
    <section id="customersSection" class="section hidden">
      <h2>Customers</h2>
      <button id="addCustomerBtn">Add Customer</button>
      <div id="customersList"></div>
    </section>

    <!-- QUOTES -->
    <section id="quotesSection" class="section hidden">
      <h2>Quotes</h2>
      <button id="addQuoteBtn">Add Quote / Repair</button>
      <div id="quotesList"></div>
    </section>

    <!-- INVOICES -->
    <section id="invoicesSection" class="section hidden">
      <h2>Invoices</h2>
      <button id="addInvoiceBtn">Add Invoice</button>
      <div id="invoicesList"></div>
    </section>

    <!-- REPAIRS -->
    <section id="repairsSection" class="section hidden">
      <h2>Repair Types</h2>
      <button id="addRepairBtn">Add Repair</button>
      <ul id="repairsList"></ul>
    </section>

    <!-- PARTS -->
    <section id="partsSection" class="section hidden">
      <h2>Parts</h2>
      <button id="addPartBtn">Add Part</button>
      <ul id="partsList"></ul>
    </section>

    <!-- TECHNICIANS -->
    <section id="techniciansSection" class="section hidden">
      <h2>Technicians</h2>
      <button id="addTechnicianBtn">Add Technician</button>
      <ul id="techniciansList"></ul>
    </section>

  </main>

</div>

<!-- ===== MODALS ===== -->
<div id="bookingModal" class="modal hidden"></div>
<div id="customerModal" class="modal hidden"></div>
<div id="vehicleModal" class="modal hidden"></div>
<div id="quoteModal" class="modal hidden"></div>
<div id="invoiceModal" class="modal hidden"></div>

<!-- ===== SCRIPTS ===== -->
<script src="apps.js"></script>
<script src="bookings.js"></script>
<script src="customers.js"></script>
<script src="quotes.js"></script>
<script src="invoices.js"></script>
<script src="repairs.js"></script>
<script src="parts.js"></script>
<script src="technicians.js"></script>

</body>
</html>
