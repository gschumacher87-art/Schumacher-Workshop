<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Schumacher Automotive</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="container">

    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="sidebar-header">Schumacher Automotive</div>
        <ul>
            <li class="active">Dashboard</li>
        </ul>
    </aside>

    <!-- Main Content -->
    <main class="main">

        <!-- Dashboard Section -->
        <section id="dashboardSection" class="dashboard-section">
            <div class="dashboard">
                <div class="dashboard-top">
                    <canvas id="analogClock" width="120" height="120"></canvas>
                    <div class="current-date" id="currentDate"></div>
                </div>

                <div class="cards">
                    <div class="card calendar-card">
                        <h3>Calendar</h3>
                        <p id="bookingsCount">0</p>
                    </div>
                    <div class="card vehicles-card">
                        <h3>Vehicles in Workshop</h3>
                        <p id="vehiclesCount">0</p>
                    </div>
                    <div class="card jobs-card">
                        <h3>Today's Jobs</h3>
                        <p id="jobsCount">0</p>
                    </div>
                </div>
            </div>
        </section>

        <!-- Calendar Section -->
        <section id="calendarSection" class="calendar-section" style="display:none;">
            <div class="calendar-header">
                <button id="prevMonth">&lt;</button>
                <span id="monthYear"></span>
                <button id="nextMonth">&gt;</button>
            </div>
            <div class="calendar-table-container">
                <table id="calendarTable">
                    <thead>
                        <tr>
                            <th>Sun</th><th>Mon</th><th>Tue</th><th>Wed</th>
                            <th>Thu</th><th>Fri</th><th>Sat</th>
                        </tr>
                    </thead>
                    <tbody>
                        <!-- Dates generated by JS -->
                    </tbody>
                </table>
            </div>
        </section>

    </main>

</div>

<script src="apps.js"></script>
</body>
</html>
