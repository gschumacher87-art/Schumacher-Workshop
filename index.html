<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Schumacher Automotive</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="container">

   <!-- ===== SIDEBAR ===== -->
<aside class="sidebar">
    <div class="sidebar-header">Schumacher Automotive</div>
    <ul>
        <!-- ===== DASHBOARD TAB ===== -->
        <li class="active" id="dashboardTab">Dashboard</li>

        <!-- ===== CUSTOMERS TAB ===== -->
        <li class="active" id="customersTab">Customers</li>
    </ul>
</aside>

    <!-- Main Content -->
    <main class="main">

        <!-- Dashboard Section -->
        <section id="dashboardSection" class="dashboard-section">
            <div class="cards">
                <div class="card calendar-card">
                    <h3>Calendar</h3>
                    <p id="bookingsCount">0</p>
                </div>
                <div class="card vehicles-card">
                    <h3>Vehicles in Workshop</h3>
                    <p id="vehiclesCount">0</p>
                </div>
                <div class="card jobs-card">
                    <h3>Today's Jobs</h3>
                    <p id="jobsCount">0</p>
                </div>
            </div>
        </section>

        <!-- Calendar Section -->
<section id="calendarSection" class="calendar-section" style="display:none;">
    <div class="calendar-header">
        <button id="prevMonth">&lt;</button>
        <span id="monthYear"></span>
        <button id="nextMonth">&gt;</button>
    </div>
    <div class="calendar-table-container">
        <table id="calendarTable">
            <thead>
                <tr>
                    <th>Sun</th><th>Mon</th><th>Tue</th><th>Wed</th>
                    <th>Thu</th><th>Fri</th><th>Sat</th>
                </tr>
            </thead>
            <tbody>
                <!-- Dates generated by JS -->
            </tbody>
        </table>
    </div>
    <!-- Booking Form Container moved OUTSIDE table container -->
    <div id="bookingForm" style="display:none; margin-top:15px;">
        <!-- Booking heading and Add Booking button appear here -->
    </div>
<!-- ===== END CALENDAR ===== -->
</section>
<!-- ===== CUSTOMERS SECTION ===== -->

    </main>

</div>

<script src="apps.js"></script>
</body>
</html>
