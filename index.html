<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Schumacher Automotive DMS</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="sidebar">
    <div class="sidebar-header">
        Schumacher Automotive
    </div>
    <ul class="sidebar-menu">
        <li class="active">Dashboard</li>
    </ul>
</div>

<div class="main">
    <div class="top-bar">
        <div id="liveClock">00:00:00</div>
    </div>

    <h1>Dashboard</h1>

    <div class="cards">
        <div class="card">
            <h3>Today's Bookings</h3>
            <p id="bookingCount">0</p>
            <p id="currentDate">dd/mm/yyyy</p>
        </div>
        <div class="card">
            <h3>Vehicles in Workshop</h3>
            <p id="vehiclesCount">0</p>
        </div>
        <div class="card">
            <h3>Hours Booked Today</h3>
            <p id="hoursBooked">0</p>
        </div>
    </div>
</div>

</body>
</html>
